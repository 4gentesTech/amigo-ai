linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - gosec
    - gocyclo
    - dupl

linters-settings:
  gocyclo:
    min-complexity: 15
  gosec:
    excludes:
      - G104  # Audit errors not checked

run:
  timeout: 5m
  tests: false
